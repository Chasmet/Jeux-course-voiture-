<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Course Rouge vs Dorée</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b1220;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 70vh 30vh;
    }

    #game {
      width: 100%;
      height: 100%;
      display: block;
      background: linear-gradient(to bottom, #7dd3fc 0%, #dbeafe 40%, #7cda67 40%, #65c757 100%);
    }

    #controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      padding: 14px;
      background: linear-gradient(to bottom, #08101b, #0f1b2d);
      align-items: center;
    }

    button {
      border: none;
      border-radius: 18px;
      height: 84px;
      font-size: 1.15rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    #left {
      background: linear-gradient(to bottom, #4f8df7, #2458d3);
    }

    #boost {
      background: linear-gradient(to bottom, #ffb11f, #ea8a00);
    }

    #right {
      background: linear-gradient(to bottom, #5aa3ff, #2f68e8);
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: white;
      font-weight: bold;
      z-index: 5;
      pointer-events: none;
    }

    .box {
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 0.95rem;
    }

    #msg {
      position: absolute;
      left: 50%;
      top: 32%;
      transform: translate(-50%, -50%);
      color: white;
      background: rgba(0,0,0,0.45);
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.1rem;
      z-index: 6;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="box" id="speedBox">Vitesse: 0</div>
    <div class="box" id="distBox">Toi: 0 m</div>
    <div class="box" id="aiBox">IA: 0 m</div>
  </div>

  <div id="msg"></div>

  <div id="wrap">
    <canvas id="game"></canvas>

    <div id="controls">
      <button id="left">GAUCHE</button>
      <button id="boost">BOOST</button>
      <button id="right">DROITE</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const speedBox = document.getElementById("speedBox");
    const distBox = document.getElementById("distBox");
    const aiBox = document.getElementById("aiBox");
    const msg = document.getElementById("msg");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = Math.floor(window.innerHeight * 0.7);
      player.y = canvas.height - 90;
      ai.y = 140;
    }

    const player = {
      x: 0,
      y: 0,
      w: 34,
      h: 62,
      speed: 6,
      distance: 0,
      color: "red"
    };

    const ai = {
      x: 0,
      y: 0,
      w: 34,
      h: 62,
      speed: 5.6,
      distance: 0,
      color: "gold"
    };

    let leftPressed = false;
    let rightPressed = false;
    let boostPressed = false;
    let roadOffset = 0;
    let bgOffset = 0;
    let finished = false;
    const finishDistance = 2500;

    function resetCars() {
      player.x = canvas.width * 0.44;
      ai.x = canvas.width * 0.56;
    }

    function init() {
      resizeCanvas();
      resetCars();
    }

    window.addEventListener("resize", () => {
      resizeCanvas();
      resetCars();
    });

    function bindButton(id, onStart, onEnd) {
      const el = document.getElementById(id);

      el.addEventListener("touchstart", (e) => {
        e.preventDefault();
        onStart();
      }, { passive: false });

      el.addEventListener("touchend", (e) => {
        e.preventDefault();
        onEnd();
      }, { passive: false });

      el.addEventListener("touchcancel", (e) => {
        e.preventDefault();
        onEnd();
      }, { passive: false });

      el.addEventListener("mousedown", onStart);
      el.addEventListener("mouseup", onEnd);
      el.addEventListener("mouseleave", onEnd);
    }

    bindButton("left", () => leftPressed = true, () => leftPressed = false);
    bindButton("right", () => rightPressed = true, () => rightPressed = false);
    bindButton("boost", () => boostPressed = true, () => boostPressed = false);

    function drawBackground() {
      const w = canvas.width;
      const h = canvas.height;

      ctx.clearRect(0, 0, w, h);

      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, "#7dd3fc");
      sky.addColorStop(0.45, "#e0f2fe");
      sky.addColorStop(0.46, "#6fd05c");
      sky.addColorStop(1, "#57b84c");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = "rgba(255,255,255,0.9)";
      for (let i = 0; i < 4; i++) {
        const x = ((i * 210 - bgOffset * 0.3) % (w + 200)) - 100;
        const y = 55 + i * 14;
        ctx.beginPath();
        ctx.arc(x, y, 18, 0, Math.PI * 2);
        ctx.arc(x + 22, y - 8, 20, 0, Math.PI * 2);
        ctx.arc(x + 45, y, 16, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "#7b8da1";
      for (let i = -1; i < 5; i++) {
        const mx = i * 180 - (bgOffset * 0.18 % 180);
        ctx.beginPath();
        ctx.moveTo(mx, h * 0.42);
        ctx.lineTo(mx + 70, h * 0.2);
        ctx.lineTo(mx + 160, h * 0.42);
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = "#286b2f";
      for (let i = 0; i < 8; i++) {
        const tx = ((i * 120 - bgOffset * 0.6) % (w + 60)) - 30;
        ctx.fillRect(tx, h * 0.42, 6, 30);
        ctx.beginPath();
        ctx.arc(tx + 3, h * 0.4, 20, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawRoad() {
      const w = canvas.width;
      const h = canvas.height;
      const roadWidth = w * 0.36;
      const roadX = (w - roadWidth) / 2;

      ctx.fillStyle = "#2a2a2f";
      ctx.fillRect(roadX, 0, roadWidth, h);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(roadX, 0, 4, h);
      ctx.fillRect(roadX + roadWidth - 4, 0, 4, h);

      for (let i = 0; i < 14; i++) {
        const y = (i * 70 + roadOffset) % (h + 80) - 40;
        ctx.fillRect(w / 2 - 4, y, 8, 40);
      }

      ctx.fillStyle = "#3c9140";
      ctx.fillRect(0, 0, roadX, h);
      ctx.fillRect(roadX + roadWidth, 0, w - (roadX + roadWidth), h);
    }

    function drawCar(car) {
      ctx.save();
      ctx.translate(car.x, car.y);

      ctx.fillStyle = car.color;
      ctx.fillRect(-car.w / 2, -car.h / 2, car.w, car.h);

      ctx.fillStyle = "#dbeafe";
      ctx.fillRect(-10, -18, 20, 14);

      ctx.fillStyle = "#111";
      ctx.fillRect(-16, -24, 6, 16);
      ctx.fillRect(10, -24, 6, 16);
      ctx.fillRect(-16, 8, 6, 16);
      ctx.fillRect(10, 8, 6, 16);

      ctx.restore();
    }

    function update() {
      if (finished) return;

      let currentSpeed = boostPressed ? 9.5 : 6.2;
      player.speed = currentSpeed;

      if (leftPressed) player.x -= 5.5;
      if (rightPressed) player.x += 5.5;

      const roadWidth = canvas.width * 0.36;
      const roadX = (canvas.width - roadWidth) / 2;

      if (player.x < roadX + 18) player.x = roadX + 18;
      if (player.x > roadX + roadWidth - 18) player.x = roadX + roadWidth - 18;

      const aiTarget = player.x < canvas.width / 2 ? canvas.width * 0.57 : canvas.width * 0.43;
      ai.x += (aiTarget - ai.x) * 0.025;

      player.distance += player.speed;
      ai.distance += ai.speed + Math.random() * 0.4;

      roadOffset += player.speed;
      bgOffset += player.speed * 0.7;

      if (player.distance >= finishDistance) {
        finished = true;
        msg.style.display = "block";
        msg.textContent = "Victoire, tu bats l’ordinateur";
      } else if (ai.distance >= finishDistance) {
        finished = true;
        msg.style.display = "block";
        msg.textContent = "Défaite, l’ordinateur gagne";
      }

      speedBox.textContent = "Vitesse: " + Math.round(player.speed * 20);
      distBox.textContent = "Toi: " + Math.round(player.distance) + " m";
      aiBox.textContent = "IA: " + Math.round(ai.distance) + " m";
    }

    function loop() {
      drawBackground();
      drawRoad();
      update();
      drawCar(ai);
      drawCar(player);
      requestAnimationFrame(loop);
    }

    init();
    loop();
  </script>
</body>
</html>
